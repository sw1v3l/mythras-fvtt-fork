name: Release Creation

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Update system.json
        run: node updatesystemjson.js --repository=${{ github.repository }} --systemVersion=${{ github.ref_name }}

      - name: Build
        run: npm run build

      - name: Prepare Release Package
        run: |
          mv dist mythras
          zip mythras.zip -r mythras

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            system.json
            mythras.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

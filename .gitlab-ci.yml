image: node:18

stages:
  - build

before_script:
  - apt-get update
  - apt-get install zip

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

build:release:
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG != null'
  script:
    - npm ci --cache .npm --prefer-offline
    - node updatesystemjson.js --gitlabpath=$CI_PROJECT_PATH --versiontag=$CI_COMMIT_TAG --jobid=$CI_JOB_ID
    - npm run build
    - mv dist mythras
    - zip mythras.zip -r mythras
  artifacts:
    paths:
      - mythras.zip
      - system.json
